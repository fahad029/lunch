<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c2740">
<title>Parent Reviews | Lunchtime Express</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:ital,wght@0,500;0,600;0,700;0,800;1,800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#123655; --navy-deep:#0c2740;
    --steel:#EDF3F6; --steel-line:#D3E0E7;
    --gold:#F8B810; --gold-deep:#E8A33D;
    --leaf:#3E8F5C; --leaf-deep:#2E6E45;
    --chili:#D8503A; --whatsapp:#25D366;
    --cream:#FAF9F6; --ink:#16324F; --ink-soft:#4C6478; --white:#FFFFFF;
    --radius:18px; --shadow:0 16px 40px -12px rgba(18,54,85,0.15);
    --font-display:'Baloo 2', system-ui, sans-serif;
    --font-body:'Manrope', system-ui, sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  *{box-sizing:border-box;} html{scroll-behavior:smooth;}
  body{ margin:0; font-family:var(--font-body); color:var(--ink); background:var(--cream); -webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
  h1,h2,h3{font-family:var(--font-display);margin:0;line-height:1.08;color:var(--navy-deep);}
  p{margin:0;}
  
  /* Nav Header */
  header.site-nav{ position:sticky;top:0;z-index:60; background:rgba(250,249,246,0.85); backdrop-filter:blur(16px); border-bottom:1px solid var(--steel-line); }
  .nav-inner{ display:flex;align-items:center;justify-content:space-between; padding:14px 24px;max-width:1180px;margin:0 auto; }
  .brand{display:flex;align-items:center;gap:10px; transition: transform 0.2s;}
  .brand:hover { transform: scale(1.02); }
  .brand svg{width:46px;height:46px;flex-shrink:0;}
  .brand-text{font-family:var(--font-display);font-weight:800;font-style:italic;font-size:22px;color:var(--navy-deep);line-height:1;}
  
  /* Back Button */
  .back-btn { display:inline-flex; align-items:center; gap:8px; font-weight:700; color:var(--ink-soft); margin-top:40px; transition: color 0.2s; }
  .back-btn:hover { color: var(--gold-deep); }
  .back-btn svg { width:20px; height:20px; }

  /* Page Header */
  .page-header { text-align: center; padding: 60px 0 40px; }
  .page-header h1 { font-size: clamp(34px, 4vw, 46px); margin-bottom: 12px; text-transform: uppercase; letter-spacing: -0.5px;}
  .page-header p { font-size: 18px; color: var(--ink-soft); font-weight: 600;}

  /* Reviews Grid */
  .reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:80px;}
  @media (max-width:940px){ .reviews-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:600px){ .reviews-grid{grid-template-columns:1fr;} .page-header { padding: 40px 0 30px; } }
  
  .review-card{
    background:var(--white);border:1px solid var(--steel-line);border-radius:var(--radius);padding:28px;
    display:flex;flex-direction:column;gap:14px; transition: var(--transition-smooth);
  }
  .review-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
  .review-head{display:flex;align-items:center;gap:14px;}
  .review-avatar{
    width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:700;color:#fff;font-size:16px;flex-shrink:0;
  }
  .review-name{font-weight:800;font-size:16px;}
  .review-sub{font-size:13px;color:var(--ink-soft);font-family:var(--font-mono);}
  .review-text{font-size:15px;color:var(--ink-soft);line-height:1.6; font-style: italic;}
  .stars{display:flex;gap:4px;}
  .stars svg{width:16px;height:16px;}
  .star-fill{color:var(--gold-deep);}
  .star-empty{color:var(--steel-line);}

  /* Skeleton */
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skeleton { background: #f0f0f0; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); background-size: 200% 100%; animation: 1.5s shimmer linear infinite; border-radius: 8px; border:none; height:180px; }

  footer{background:var(--navy-deep);color:#B9CADA;padding:40px 0; text-align:center;}
</style>
</head>
<body>

<header class="site-nav">
  <div class="nav-inner">
    <a href="/" class="brand">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <circle cx="32" cy="32" r="31" fill="#123655"/>
        <rect x="16" y="28" width="32" height="22" rx="6" fill="#F8B810"/>
        <rect x="16" y="28" width="32" height="6" rx="3" fill="#E8A33D"/>
        <path d="M22 28 Q22 18 27 18 Q29 12 32 12 Q35 12 37 18 Q42 18 42 28 Z" fill="#EDF3F6"/>
        <circle cx="26" cy="40" r="2.6" fill="#123655"/>
        <circle cx="38" cy="40" r="2.6" fill="#123655"/>
        <path d="M25 44c2 2 12 2 14 0" stroke="#3E8F5C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <span class="brand-text">LUNCHTIME EXPRESS</span>
    </a>
  </div>
</header>

<main class="wrap">
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to Home
  </a>

  <div class="page-header">
    <h1>All Parent Reviews</h1>
    <p>Read what families across South Kolkata are saying about our service.</p>
  </div>

  <div class="reviews-grid" id="full-reviews-grid">
    <!-- Skeletons load instantly while Firebase fetches -->
    <div class="review-card skeleton"></div>
    <div class="review-card skeleton"></div>
    <div class="review-card skeleton"></div>
    <div class="review-card skeleton"></div>
    <div class="review-card skeleton"></div>
    <div class="review-card skeleton"></div>
  </div>
</main>

<footer>
  <p>© <span id="year"></span> Lunchtime Express. All rights reserved.</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAIjOf3KcuVULDtOH6dd17zatfQZEGa5rw",
    authDomain: "lunchtime-ffe98.firebaseapp.com",
    projectId: "lunchtime-ffe98",
    storageBucket: "lunchtime-ffe98.firebasestorage.app",
    messagingSenderId: "135182082883",
    appId: "1:135182082883:web:9292f6e1dcff9360ee05f6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById('year').textContent = new Date().getFullYear();
  const avatarColors = ['#3E8F5C','#E8A33D','#D8503A', '#123655', '#2E6E45'];
  function initials(name){ return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
  function escapeHTML(str){ const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
  
  function starsSVG(count){
    const path = 'M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z';
    let html = '';
    for(let i=1;i<=5;i++) html += `<svg viewBox="0 0 24 24" fill="currentColor" class="${i<=count ? 'star-fill' : 'star-empty'}"><path d="${path}"/></svg>`;
    return html;
  }

  const seedReviews = [
    {name:"Ritwika Sen", area:"Ballygunge parent", rating:5, text:"My daughter's lunch reaches her hot and right on time every single day. The rider even waits if her class is running a minute late."},
    {name:"Pritam Dasgupta", area:"Jadavpur parent", rating:5, text:"Switched from a tiffin service that kept skipping days. Lunchtime Express hasn't missed once in four months."},
    {name:"Amitava Roy", area:"Kalighat parent", rating:5, text:"The riders are polite and always in uniform. My son recognises 'Lunchtime bhaiya' from a mile away now."}
  ];

  async function loadAllReviews() {
    try {
      const q = query(collection(db, "reviews"), orderBy("createdAt", "desc"), limit(50));
      const querySnapshot = await getDocs(q);
      
      let reviews = [];
      querySnapshot.forEach((doc) => { reviews.push(doc.data()); });
      
      if(reviews.length === 0) reviews = seedReviews; // Fallback

      const grid = document.getElementById('full-reviews-grid');
      grid.innerHTML = reviews.map((r,i)=>`
        <div class="review-card">
          <div class="review-head">
            <div class="review-avatar" style="background:${avatarColors[i % avatarColors.length]}">${initials(r.name)}</div>
            <div>
              <div class="review-name">${escapeHTML(r.name)}</div>
              <div class="review-sub">${escapeHTML(r.area || 'Verified parent')}</div>
            </div>
          </div>
          <div class="stars">${starsSVG(r.rating)}</div>
          <p class="review-text">"${escapeHTML(r.text)}"</p>
        </div>
      `).join('');
      
    } catch (e) {
      console.error("Error fetching reviews: ", e);
      document.getElementById('full-reviews-grid').innerHTML = '<p style="grid-column:1/-1; text-align:center;">Could not load reviews at this time.</p>';
    }
  }

  loadAllReviews();
</script>
</body>
</html>
